package:
  name: tass-core
  version: 1.0.1

source:
  path: ../

build:
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - python
    - setuptools
    - pip
  run:
    - python >=3.13
    - selenium >=4.35.0
    - openpyxl
    - packaging
    - jsonschema

extra:
  authors:
    - name: Dominic Parent
      email: dominic.parent@statcan.gc.ca
    - name: Tyler Desjardins
      email: josephgillestyler.desjardins@statcan.gc.ca